services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: locus
      POSTGRES_USER: locus
      POSTGRES_PASSWORD: ${LOCUS_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locus"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    environment:
      LOCUS_DB_URL: postgresql+asyncpg://locus:${LOCUS_DB_PASSWORD}@db:5432/locus
      LOCUS_SECRET_KEY: ${LOCUS_SECRET_KEY}
      LOCUS_ENCRYPTION_KEY: ${LOCUS_ENCRYPTION_KEY}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${SSH_KEY_DIR:-~/.ssh}:/home/locus/.ssh:ro

  app-dev:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    profiles:
      - dev
    environment:
      LOCUS_DB_URL: postgresql+asyncpg://locus:${LOCUS_DB_PASSWORD}@db:5432/locus
      LOCUS_SECRET_KEY: ${LOCUS_SECRET_KEY}
      LOCUS_ENCRYPTION_KEY: ${LOCUS_ENCRYPTION_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${SSH_KEY_DIR:-~/.ssh}:/home/locus/.ssh:ro
      - ./backend:/app

  frontend-dev:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: development
    profiles:
      - dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      API_HOST: app-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
