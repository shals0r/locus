services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: locus
      POSTGRES_USER: locus
      POSTGRES_PASSWORD: ${LOCUS_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locus"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LOCUS_DB_URL: postgresql+asyncpg://locus:${LOCUS_DB_PASSWORD}@db:5432/locus
      LOCUS_SECRET_KEY: ${LOCUS_SECRET_KEY}
      LOCUS_ENCRYPTION_KEY: ${LOCUS_ENCRYPTION_KEY}
      LOCUS_IN_DOCKER: "1"
      LOCUS_LOCAL_SSH_HOST: host.docker.internal
      LOCUS_LOCAL_SSH_PORT: ${LOCUS_HOST_SSH_PORT:-22}
      LOCUS_LOCAL_SSH_USER: ${LOCUS_HOST_SSH_USER:-}
      LOCUS_LOCAL_SSH_KEY: /home/locus/.ssh/id_ed25519
      LOCUS_AGENT_URL: "http://host.docker.internal:7700"
      LOCUS_AGENT_TOKEN_FILE: "/opt/locus-agent/agent.token"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${SSH_KEY_DIR:-~/.ssh}:/home/locus/.ssh:ro
      - workerdata:/data/workers
      - agent-data:/opt/locus-agent:ro

  app-dev:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    profiles:
      - dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LOCUS_DB_URL: postgresql+asyncpg://locus:${LOCUS_DB_PASSWORD}@db:5432/locus
      LOCUS_SECRET_KEY: ${LOCUS_SECRET_KEY}
      LOCUS_ENCRYPTION_KEY: ${LOCUS_ENCRYPTION_KEY}
      LOCUS_IN_DOCKER: "1"
      LOCUS_LOCAL_SSH_HOST: host.docker.internal
      LOCUS_LOCAL_SSH_PORT: ${LOCUS_HOST_SSH_PORT:-22}
      LOCUS_LOCAL_SSH_USER: ${LOCUS_HOST_SSH_USER:-}
      LOCUS_LOCAL_SSH_KEY: /home/locus/.ssh/id_ed25519
      LOCUS_AGENT_URL: "http://host.docker.internal:7700"
      LOCUS_AGENT_TOKEN_FILE: "/opt/locus-agent/agent.token"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${SSH_KEY_DIR:-~/.ssh}:/home/locus/.ssh:ro
      - ./backend:/app
      - workerdata:/data/workers
      - agent-data:/opt/locus-agent:ro

  frontend-dev:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: development
    profiles:
      - dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      API_HOST: app-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
  workerdata:
  agent-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${LOCUS_AGENT_DIR:-/home/${USER:-locus}/.locus-agent}
